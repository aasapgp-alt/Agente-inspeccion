# ═══════════════════════════════════════════════════════════════
# 🎯 STREAMLIT CONFIG — INSPECTOR IA INDUSTRIAL v4.0
# 📦 Optimizado para Hugging Face Spaces
# 🎨 Tema: Dark Cyberpunk (ARAUCO Brand)
# ═══════════════════════════════════════════════════════════════

# ── SERVIDOR ──────────────────────────────────────────────────
[server]
# ⚡ Performance
headless = true
enableStaticServing = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200  # MB (para imágenes de inspección)

# 🔒 Seguridad
secretKey = "@streamlitsecret"  # Override con st.secrets en producción

# 🌐 Network
address = "0.0.0.0"
port = 8501

# ⏱️ Timeouts
maxMessageSize = 200


# ── CLIENTE ───────────────────────────────────────────────────
[client]
# 🖥️ Layout
displayMode = "wide"
layout = "wide"
toolbarMode = "minimal"  # ⚡ "minimal" = más limpio, "viewer" = sin toolbar
showSidebarNavigation = true

# 🎨 Theme (se aplica con st.set_page_config)
# primaryColor = "#00c8d7"     # Cyan ARAUCO
# backgroundColor = "#0d1117"  # Dark base
# secondaryBackgroundColor = "#1a2236"
# textColor = "#e8edf3"
# font = "sans serif"


# ── RUN ───────────────────────────────────────────────────────
[run]
# 🔄 Auto-rerun al guardar código
onSave = "rerun"

# 📂 Watch additional directories (para hot-reload)
# fileWatcherType = "poll"
# pollInterval = 500


# ── THEME (override inline) ──────────────────────────────────
[theme]
# 🎨 ARAUCO Cyberpunk Palette
primaryColor = "#00c8d7"      # Cyan principal
backgroundColor = "#0d1117"   # Dark base
secondaryBackgroundColor = "#1a2236"
textColor = "#e8edf3"
font = "sans serif"

# 🔤 Fonts
base = "sans serif"
headingFont = "sans serif"
codeFont = "JetBrains Mono, monospace"

# 📏 Sizing
fontSizes = {xs = 11, sm = 13, md = 16, lg = 20, xl = 28}

# 🎯 Border radius
borderRadius = 8


# ── LOGGING ───────────────────────────────────────────────────
[logger]
# 📝 Nivel de log
level = "info"

# 📊 Format
showColumn = true
showRowNumber = true


# ── BROWSER ───────────────────────────────────────────────────
[browser]
gatherUsageStats = false  # 🚫 No enviar telemetría a Streamlit


# ── DEPRECATED (compatibilidad) ───────────────────────────────
[deprecation]
showPyplotGlobalUse = false


# ═══════════════════════════════════════════════════════════════
# 🚀 COMANDOS PARA EJECUTAR:
# streamlit run app.py --server.port 8501 --server.headless true
# ═══════════════════════════════════════════════════════════════
